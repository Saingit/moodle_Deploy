# nginx/conf.d/moodle.conf
# Configuración de LABORATORIO: acceso por HTTP plano vía IP en intranet.
# Sin TLS por ahora. Cuando pases a producción con dominio real, vuelve a
# habilitar el bloque HTTPS (ver nginx/conf.d/moodle.conf.prod-example) y
# monta certificados reales en ./nginx/certs.
server {
    listen 80;
    server_name _;

    # IMPORTANTE (cambio de Moodle 5.1+): el código se clona en
    # /var/www/html, pero config.php y otros archivos sensibles viven en la
    # raíz de ese directorio, FUERA del webroot real. El webroot público es
    # el subdirectorio "public/". Nginx solo debe servir desde ahí.
    root /var/www/html/public;
    index index.php;

    client_max_body_size 200M;

    # moodledata NUNCA debe ser servida por Nginx; vive en un volumen
    # aparte fuera del docroot, así que no requiere bloque "location" aquí.

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Moodle usa "slash arguments" (PATH_INFO) en varios scripts —
    # theme/styles.php/<theme>/<rev>/all, theme/yui_combo.php?..., etc. —
    # para servir CSS/JS con URLs cacheables. El regex original "\.php$"
    # exige que la URL TERMINE en ".php", pero estas URLs continúan después
    # (ej. ".../styles.php/boost/123_456/all"), así que nunca entraban a
    # este bloque y caían en el location "/" -> try_files -> index.php,
    # devolviendo HTML donde el navegador esperaba CSS/JS.
    # Este regex acepta ".php" seguido de "/" + cualquier cosa, o de fin de
    # línea, y separa correctamente SCRIPT_FILENAME de PATH_INFO.
    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        # "php" es el nombre del servicio PHP-FPM en docker-compose.yml,
        # resuelto vía DNS interno de la red "backend".
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\. {
        deny all;
    }
}