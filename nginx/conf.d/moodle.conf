# nginx/conf.d/moodle.conf
# Configuración de LABORATORIO: acceso por HTTP plano vía IP en intranet.
# Sin TLS por ahora. Cuando pases a producción con dominio real, vuelve a
# habilitar el bloque HTTPS (ver nginx/conf.d/moodle.conf.prod-example) y
# monta certificados reales en ./nginx/certs.

server {
    listen 80;
    server_name _;
    # IMPORTANTE (cambio de Moodle 5.1+): el código se clona en
    # /var/www/html, pero config.php y otros archivos sensibles viven en la
    # raíz de ese directorio, FUERA del webroot real. El webroot público es
    # el subdirectorio "public/". Nginx solo debe servir desde ahí.
    root /var/www/html/public;
    index index.php;

    client_max_body_size 200M;

    # moodledata NUNCA debe ser servida por Nginx; vive en un volumen
    # aparte fuera del docroot, así que no requiere bloque "location" aquí.

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        # "php" es el nombre del servicio PHP-FPM en docker-compose.yml,
        # resuelto vía DNS interno de la red "backend".
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\. {
        deny all;
    }
}

