; php/php.ini
; Ajustes recomendados por la documentación oficial de Moodle para producción.
; NOTA: php.ini no interpola variables de entorno (${...}); a diferencia del
; docker-compose.yml, aquí los valores van fijos. Si cambias los valores del
; .env (PHP_MEMORY_LIMIT, etc.), edita también estas líneas y reconstruye
; la imagen ("docker compose build php").

memory_limit = 256M
upload_max_filesize = 200M
post_max_size = 200M
max_input_vars = 5000
max_execution_time = 300
session.gc_maxlifetime = 7200

; OPcache: rendimiento crítico en producción
opcache.enable = 1
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0

date.timezone = "America/Bogota"
